name: neurogen
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  dio: ^5.9.2
  image_picker: ^1.2.1
  get_it: ^9.2.1
  flutter_dotenv: ^6.0.0
  crypto: ^3.0.7
  cached_network_image: ^3.4.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.2
  gal: ^2.3.2
  go_router: ^17.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true

  uses-material-design: true

  assets:
    - assets/.env

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/app_icon.png
  adaptive_icon_background: '#0B0E14'
  adaptive_icon_foreground: assets/app_icon.png
